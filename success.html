<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembayaran Berhasil</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
max-width:550px;
width:100%;
text-align:center;
padding:40px 30px;
border:1px solid rgba(255,255,255,.1);
border-radius:20px;
background:rgba(255,255,255,.03);
backdrop-filter:blur(10px);
}

.icon{
font-size:90px;
margin-bottom:20px;
}

h1{
font-size:34px;
margin-bottom:15px;
}

p{
color:#aaa;
line-height:1.8;
margin-bottom:30px;
}

.info{
background:rgba(255,255,255,.05);
padding:15px;
border-radius:12px;
margin-bottom:25px;
font-size:14px;
color:#ccc;
}

.btn{
display:inline-block;
padding:14px 28px;
background:#fff;
color:#000;
text-decoration:none;
border-radius:12px;
font-weight:700;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
}
</style>

</head>
<body>

<div class="container">

<div class="icon">✅</div>

<h1>Pembayaran Berhasil</h1>

<p>
Terima kasih. Konfirmasi pembayaran telah berhasil dikirim dan transaksi Anda sedang diproses.
</p>

<div class="info">
Status: BERHASIL<br>
Metode: QRIS<br>
Waktu: <span id="waktu"></span>
</div>

<a href="index.html" class="btn">
Kembali ke Beranda
</a>

</div>

<script>
document.getElementById("waktu").textContent =
new Date().toLocaleString("id-ID");
</script>

</body>
</html>
